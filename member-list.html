<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Members - Al Ikhlas</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-color: #0B111B;
      --card-bg: #151F2E;
      --primary: #10B981;
      --text-main: #F3F4F6;
      --text-muted: #9CA3AF;
      --border-color: #374151;
    }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      width: 100%;
      max-width: 500px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    .header h1 {
      font-size: 1.5rem;
      color: var(--primary);
    }
    .back-btn {
      padding: 0.5rem 1rem;
      background: var(--border-color);
      border: none;
      border-radius: 8px;
      color: var(--text-main);
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
    }
    .back-btn:hover {
      background: #4B5563;
    }
    .list-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .member-item {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border: 1px solid transparent;
      transition: border-color 0.2s;
    }
    .member-item:hover {
      border-color: var(--primary);
    }
    .member-img {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--primary);
      background-color: var(--bg-color);
      flex-shrink: 0;
    }
    .member-details {
      flex-grow: 1;
    }
    .member-name {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .member-serial {
      font-size: 0.8rem;
      background-color: rgba(16, 185, 129, 0.1);
      color: var(--primary);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      display: inline-block;
    }
    .loading {
      text-align: center;
      color: var(--text-muted);
      padding: 2rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Members Directory</h1>
      <button class="back-btn" onclick="window.location.href='index.html'">Back</button>
    </div>

    <div class="list-container" id="membersList">
      <div class="loading">Loading members...</div>
    </div>
  </div>

  <script>
    const DEFAULT_IMAGE = "https://i.ibb.co.com/zHSB2sKx/IMG-20231221-WA0004.jpg";

    async function loadMembers() {
      const listContainer = document.getElementById('membersList');
      try {
        const response = await fetch('data.json');
        const members = await response.json();
        
        listContainer.innerHTML = ''; // Clear loading

        if(members.length === 0) {
          listContainer.innerHTML = '<div class="loading">No members found.</div>';
          return;
        }

        members.forEach(member => {
          const item = document.createElement('div');
          item.className = 'member-item';

          const imgSrc = member.profile_image || DEFAULT_IMAGE;

          item.innerHTML = `
            <img src="${imgSrc}" alt="${member.name}" class="member-img" onerror="this.src='${DEFAULT_IMAGE}'">
            <div class="member-details">
              <div class="member-name">${member.name || 'Unknown Name'}</div>
              <div class="member-serial">Serial: #${member.serial || 'N/A'}</div>
            </div>
          `;

          listContainer.appendChild(item);
        });

      } catch (e) {
        listContainer.innerHTML = '<div class="loading" style="color: #EF4444;">Failed to load data.</div>';
      }
    }

    document.addEventListener('DOMContentLoaded', loadMembers);
  </script>
</body>
</html>
